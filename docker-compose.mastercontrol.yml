###############################################################################
# Studio54 — MasterControl Network Override
#
# Apply this file when Studio54 is managed by MasterControl to bridge
# the studio54_network onto ai_network, enabling cross-project service
# discovery between Studio54 and other MasterControl-managed services.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.mastercontrol.yml up -d
#
# MasterControl typically sets COMPOSE_FILE in its deployment environment:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.mastercontrol.yml
###############################################################################

networks:
  ai_network:
    name: ai_network
    external: true

services:

  # API service joins ai_network so MasterControl can proxy requests to Studio54
  studio54-service:
    networks:
      - studio54_network
      - ai_network

  # Worker joins ai_network in case MasterControl dispatches tasks cross-network
  studio54-worker:
    networks:
      - studio54_network
      - ai_network

  # MusicBrainz DB joins ai_network so other MasterControl services can query it
  # (same behaviour as the old musicbrainz-docker override.yml auto-generated by MC)
  musicbrainz-db:
    networks:
      - studio54_network
      - ai_network
