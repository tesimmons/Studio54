###############################################################################
# Studio54 — Standalone Docker Compose
# Music & Audiobook Management System
#
# MusicBrainz mirror is included and runs on studio54_network so the service
# and worker containers can reach musicbrainz-db directly.
#
# MasterControl deployment: apply docker-compose.mastercontrol.yml to also
# bridge studio54-service, studio54-worker, and musicbrainz-db onto ai_network.
###############################################################################

networks:
  studio54_network:
    name: studio54_network
    driver: bridge
  # Declared here so the mastercontrol override can reference it without needing
  # to redeclare it. Not connected to any service in this base file.
  ai_network:
    name: ai_network
    external: true

volumes:
  studio54-job-logs:
    driver: local
  # MusicBrainz volumes — bind-mounted to /docker/musicbrainz/ so data survives
  # container recreation. Do not change device paths without migrating data first.
  musicbrainz-pgdata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /docker/musicbrainz/pgdata
  musicbrainz-dbdump:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /docker/musicbrainz/dbdump
  musicbrainz-mqdata:
    driver: local
  musicbrainz-solrdata:
    driver: local
  musicbrainz-solrdump:
    driver: local

services:

  # ---------------------------------------------------------------------------
  # Database (PostgreSQL)
  # ---------------------------------------------------------------------------
  studio54-db:
    image: postgres:15-alpine
    container_name: studio54-db
    restart: unless-stopped
    ports:
      - "${STUDIO54_DB_PORT:-5434}:5432"
    environment:
      - POSTGRES_DB=${STUDIO54_DB_NAME:-studio54_db}
      - POSTGRES_USER=${STUDIO54_DB_USER:-studio54}
      - POSTGRES_PASSWORD=${STUDIO54_DB_PASSWORD}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${STUDIO54_DATA_DIR:-/docker/studio54}/postgres:/var/lib/postgresql/data
    networks:
      - studio54_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STUDIO54_DB_USER:-studio54} -d ${STUDIO54_DB_NAME:-studio54_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      com.centurylinklabs.watchtower.enable: "${WATCHTOWER_STUDIO54_DB:-false}"

  # ---------------------------------------------------------------------------
  # Cache / Message Broker (Redis)
  # ---------------------------------------------------------------------------
  studio54-redis:
    image: redis:7-alpine
    container_name: studio54-redis
    restart: unless-stopped
    ports:
      - "${STUDIO54_REDIS_PORT:-6381}:6379"
    environment:
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${STUDIO54_DATA_DIR:-/docker/studio54}/redis:/data
    networks:
      - studio54_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    command: redis-server --appendonly yes
    labels:
      com.centurylinklabs.watchtower.enable: "${WATCHTOWER_STUDIO54_REDIS:-true}"

  # ---------------------------------------------------------------------------
  # API Service (FastAPI + Celery)
  # ---------------------------------------------------------------------------
  studio54-service:
    build:
      context: ./studio54-service
      dockerfile: Dockerfile
    image: studio54/service:latest
    container_name: studio54-service
    restart: unless-stopped
    ports:
      - "${STUDIO54_SERVICE_PORT:-8010}:8010"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://${STUDIO54_DB_USER:-studio54}:${STUDIO54_DB_PASSWORD}@studio54-db:5432/${STUDIO54_DB_NAME:-studio54_db}
      - REDIS_URL=redis://studio54-redis:6379/0
      - CELERY_BROKER_URL=redis://studio54-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://studio54-redis:6379/0
      - STUDIO54_ENCRYPTION_KEY=${STUDIO54_ENCRYPTION_KEY}
      - STUDIO54_MANAGED_BY=${STUDIO54_MANAGED_BY:-}
      - SABNZBD_HOST=${SABNZBD_HOST:-}
      - SABNZBD_PORT=${SABNZBD_PORT:-8080}
      - SABNZBD_API_KEY=${SABNZBD_API_KEY:-}
      - SABNZBD_DOWNLOAD_DIR=${SABNZBD_DOWNLOAD_DIR:-/downloads/music}
      - MUSIC_LIBRARY_PATH=${MUSIC_LIBRARY_PATH:-/music}
      - AUDIOBOOKS_PATH=${AUDIOBOOKS_PATH:-/audiobooks}
      - OLLAMA_URL=${OLLAMA_URL:-http://localhost:11434}
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - FANART_API_KEY=${FANART_API_KEY:-}
      - LASTFM_API_KEY=${LASTFM_API_KEY:-}
      - ACOUSTID_API_KEY=${ACOUSTID_API_KEY:-}
      - AUDD_API_TOKEN=${AUDD_API_TOKEN:-}
      - MUSE_SERVICE_URL=${MUSE_SERVICE_URL:-}
      - MUSICBRAINZ_LOCAL_DB_URL=${MUSICBRAINZ_LOCAL_DB_URL:-}
      - MUSICBRAINZ_LOCAL_DB_ENABLED=${MUSICBRAINZ_LOCAL_DB_ENABLED:-false}
      - MUSICBRAINZ_RATE_LIMIT=${MUSICBRAINZ_RATE_LIMIT:-1.0}
      - CELERY_LOG_LEVEL=${CELERY_LOG_LEVEL:-info}
      - CELERY_AUTOSCALE_MAX=${CELERY_AUTOSCALE_MAX:-8}
      - CELERY_AUTOSCALE_MIN=${CELERY_AUTOSCALE_MIN:-2}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${SABNZBD_DOWNLOAD_DIR:-/downloads/music}:${SABNZBD_DOWNLOAD_DIR:-/downloads/music}:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker-compose.yml:/app/compose/docker-compose.yml:rw
      - ./.env:/app/compose/.env:ro
      - ${MUSIC_LIBRARY_PATH:-/music}:/music:rw
      - ${AUDIOBOOKS_PATH:-/audiobooks}:/audio_books:rw
      - studio54-job-logs:/app/logs/jobs
      - ${STUDIO54_DATA_DIR:-/docker/studio54}/cover-art:/docker/studio54:rw
    depends_on:
      studio54-db:
        condition: service_healthy
      studio54-redis:
        condition: service_healthy
    networks:
      - studio54_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    labels:
      com.centurylinklabs.watchtower.enable: "${WATCHTOWER_STUDIO54_SERVICE:-true}"

  # ---------------------------------------------------------------------------
  # Celery Worker (async task processor)
  # ---------------------------------------------------------------------------
  studio54-worker:
    image: studio54/service:latest
    container_name: studio54-worker
    restart: unless-stopped
    command: >
      celery -A app.tasks.celery_app worker -E
      --loglevel=${CELERY_LOG_LEVEL:-info}
      --autoscale=${CELERY_AUTOSCALE_MAX:-8},${CELERY_AUTOSCALE_MIN:-2}
      --queues=monitoring,celery,search,sync,downloads,scan,ingest_fast,index_metadata,fetch_images,calculate_hashes,organization,library
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://${STUDIO54_DB_USER:-studio54}:${STUDIO54_DB_PASSWORD}@studio54-db:5432/${STUDIO54_DB_NAME:-studio54_db}
      - REDIS_URL=redis://studio54-redis:6379/0
      - CELERY_BROKER_URL=redis://studio54-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://studio54-redis:6379/0
      - STUDIO54_ENCRYPTION_KEY=${STUDIO54_ENCRYPTION_KEY}
      - STUDIO54_MANAGED_BY=${STUDIO54_MANAGED_BY:-}
      - SABNZBD_HOST=${SABNZBD_HOST:-}
      - SABNZBD_PORT=${SABNZBD_PORT:-8080}
      - SABNZBD_API_KEY=${SABNZBD_API_KEY:-}
      - SABNZBD_DOWNLOAD_DIR=${SABNZBD_DOWNLOAD_DIR:-/downloads/music}
      - MUSIC_LIBRARY_PATH=${MUSIC_LIBRARY_PATH:-/music}
      - AUDIOBOOKS_PATH=${AUDIOBOOKS_PATH:-/audiobooks}
      - OLLAMA_URL=${OLLAMA_URL:-http://localhost:11434}
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - FANART_API_KEY=${FANART_API_KEY:-}
      - ACOUSTID_API_KEY=${ACOUSTID_API_KEY:-}
      - MUSE_SERVICE_URL=${MUSE_SERVICE_URL:-}
      - MUSICBRAINZ_LOCAL_DB_URL=${MUSICBRAINZ_LOCAL_DB_URL:-}
      - MUSICBRAINZ_LOCAL_DB_ENABLED=${MUSICBRAINZ_LOCAL_DB_ENABLED:-false}
      - MUSICBRAINZ_RATE_LIMIT=${MUSICBRAINZ_RATE_LIMIT:-1.0}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${SABNZBD_DOWNLOAD_DIR:-/downloads/music}:${SABNZBD_DOWNLOAD_DIR:-/downloads/music}:rw
      - ./docker-compose.yml:/app/compose/docker-compose.yml:ro
      - ${MUSIC_LIBRARY_PATH:-/music}:/music:rw
      - ${AUDIOBOOKS_PATH:-/audiobooks}:/audio_books:rw
      - studio54-job-logs:/app/logs/jobs
      - ${STUDIO54_DATA_DIR:-/docker/studio54}/cover-art:/docker/studio54:rw
    depends_on:
      studio54-service:
        condition: service_healthy
    networks:
      - studio54_network
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      com.centurylinklabs.watchtower.enable: "${WATCHTOWER_STUDIO54_WORKER:-true}"
      studio54.role: worker

  # ---------------------------------------------------------------------------
  # Celery Beat (scheduled task dispatcher)
  # ---------------------------------------------------------------------------
  studio54-beat:
    image: studio54/service:latest
    container_name: studio54-beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=${CELERY_LOG_LEVEL:-info}
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://${STUDIO54_DB_USER:-studio54}:${STUDIO54_DB_PASSWORD}@studio54-db:5432/${STUDIO54_DB_NAME:-studio54_db}
      - REDIS_URL=redis://studio54-redis:6379/0
      - CELERY_BROKER_URL=redis://studio54-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://studio54-redis:6379/0
      - STUDIO54_ENCRYPTION_KEY=${STUDIO54_ENCRYPTION_KEY}
      - MUSIC_LIBRARY_PATH=${MUSIC_LIBRARY_PATH:-/music}
      - AUDIOBOOKS_PATH=${AUDIOBOOKS_PATH:-/audiobooks}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ${MUSIC_LIBRARY_PATH:-/music}:/music:rw
      - ${AUDIOBOOKS_PATH:-/audiobooks}:/audio_books:rw
    depends_on:
      studio54-service:
        condition: service_healthy
    networks:
      - studio54_network
    labels:
      com.centurylinklabs.watchtower.enable: "${WATCHTOWER_STUDIO54_BEAT:-true}"

  # ---------------------------------------------------------------------------
  # Web Frontend (React + Nginx)
  # ---------------------------------------------------------------------------
  studio54-web:
    build:
      context: ./studio54-web
      dockerfile: Dockerfile
    image: studio54/web:latest
    container_name: studio54-web
    restart: unless-stopped
    ports:
      - "${STUDIO54_WEB_PORT:-8009}:80"
    depends_on:
      studio54-service:
        condition: service_healthy
    networks:
      - studio54_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      com.centurylinklabs.watchtower.enable: "${WATCHTOWER_STUDIO54_WEB:-true}"

  # ---------------------------------------------------------------------------
  # Log Viewer (Dozzle) — optional profile
  # Enabled by default in standalone mode.
  # Skip when managed by MasterControl (which provides its own Dozzle).
  # Enable with: docker compose --profile dozzle up -d
  # or set COMPOSE_PROFILES=dozzle in .env
  # ---------------------------------------------------------------------------
  studio54-dozzle:
    image: amir20/dozzle:latest
    container_name: studio54-dozzle
    restart: unless-stopped
    profiles: ["dozzle"]
    ports:
      - "${STUDIO54_DOZZLE_PORT:-9998}:8080"
    environment:
      - DOZZLE_NO_ANALYTICS=true
      - DOZZLE_FILTER=name=studio54
      - TZ=${TZ:-America/New_York}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - studio54_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      com.centurylinklabs.watchtower.enable: "${WATCHTOWER_DOZZLE:-true}"

  # ---------------------------------------------------------------------------
  # Auto-Updater (Watchtower) — optional profile
  # Skip when managed by MasterControl (which provides its own Watchtower).
  # Enable with: docker compose --profile watchtower up -d
  # ---------------------------------------------------------------------------
  studio54-watchtower:
    image: containrrr/watchtower:latest
    container_name: studio54-watchtower
    restart: unless-stopped
    profiles: ["watchtower"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_POLL_INTERVAL=${WATCHTOWER_INTERVAL:-86400}
      - TZ=${TZ:-America/New_York}
    networks:
      - studio54_network

  # ---------------------------------------------------------------------------
  # MusicBrainz Mirror
  # Full local MusicBrainz database for rate-limit-free metadata lookups.
  # All services live on studio54_network so studio54-service and
  # studio54-worker can reach musicbrainz-db directly using the URL:
  #   postgresql://musicbrainz:musicbrainz@musicbrainz-db:5432/musicbrainz_db
  #
  # Data is persisted in /docker/musicbrainz/ (bind-mounted volumes).
  # To update replication data, exec into musicbrainz-server and run the
  # MusicBrainz replication scripts, or use the admin/replication cron.
  # ---------------------------------------------------------------------------

  musicbrainz-db:
    build:
      context: ./musicbrainz-docker/build/postgres-prebuilt
    image: studio54/musicbrainz-db:${POSTGRES_VERSION:-16}
    container_name: musicbrainz-db
    restart: unless-stopped
    command: postgres -c "shared_buffers=2048MB" -c "shared_preload_libraries=pg_amqp.so"
    environment:
      - POSTGRES_USER=${MUSICBRAINZ_DB_USER:-musicbrainz}
      - POSTGRES_PASSWORD=${MUSICBRAINZ_DB_PASSWORD:-musicbrainz}
    shm_size: "2GB"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    volumes:
      - musicbrainz-pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - studio54_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MUSICBRAINZ_DB_USER:-musicbrainz} -d musicbrainz_db"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      com.centurylinklabs.watchtower.enable: "false"
      studio54.role: musicbrainz-db

  musicbrainz-mq:
    build: ./musicbrainz-docker/build/rabbitmq
    container_name: musicbrainz-mq
    hostname: "mq"
    restart: unless-stopped
    ulimits:
      nofile: 65536
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    volumes:
      - musicbrainz-mqdata:/var/lib/rabbitmq
    expose:
      - "5672"
    networks:
      - studio54_network
    labels:
      com.centurylinklabs.watchtower.enable: "false"
      studio54.role: musicbrainz-mq

  musicbrainz-search:
    build:
      context: ./musicbrainz-docker/build/solr
      args:
        - MB_SOLR_VERSION=${MB_SOLR_VERSION:-4.1.0}
    image: studio54/musicbrainz-search:${MB_SOLR_VERSION:-4.1.0}
    container_name: musicbrainz-search
    restart: unless-stopped
    environment:
      - SOLR_HEAP=2g
      - LOG4J_FORMAT_MSG_NO_LOOKUPS=true
    mem_swappiness: 1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    expose:
      - "8983"
    volumes:
      - musicbrainz-dbdump:/media/dbdump:ro
      - musicbrainz-solrdata:/var/solr
      - musicbrainz-solrdump:/var/cache/musicbrainz/solr-backups
    networks:
      - studio54_network
    labels:
      com.centurylinklabs.watchtower.enable: "false"
      studio54.role: musicbrainz-search

  musicbrainz-redis:
    image: redis:3-alpine
    container_name: studio54-musicbrainz-redis
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    expose:
      - "6379"
    networks:
      - studio54_network
    labels:
      com.centurylinklabs.watchtower.enable: "false"
      studio54.role: musicbrainz-redis

  musicbrainz-server:
    build:
      context: ./musicbrainz-docker/build/musicbrainz-prebuilt
    image: studio54/musicbrainz-server:latest
    container_name: musicbrainz-server
    restart: unless-stopped
    ports:
      - "${MUSICBRAINZ_WEB_PORT:-5000}:5000"
    environment:
      - POSTGRES_USER=${MUSICBRAINZ_DB_USER:-musicbrainz}
      - POSTGRES_PASSWORD=${MUSICBRAINZ_DB_PASSWORD:-musicbrainz}
      - MUSICBRAINZ_BASE_FTP_URL=${MUSICBRAINZ_BASE_FTP_URL:-}
      - MUSICBRAINZ_BASE_DOWNLOAD_URL=${MUSICBRAINZ_BASE_DOWNLOAD_URL:-https://data.metabrainz.org/pub/musicbrainz}
      - MUSICBRAINZ_SERVER_PROCESSES=${MUSICBRAINZ_SERVER_PROCESSES:-10}
      - MUSICBRAINZ_USE_PROXY=1
      - MUSICBRAINZ_WEB_SERVER_HOST=${MUSICBRAINZ_WEB_SERVER_HOST:-localhost}
      - MUSICBRAINZ_WEB_SERVER_PORT=${MUSICBRAINZ_WEB_PORT:-5000}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "50"
    volumes:
      - musicbrainz-dbdump:/media/dbdump
      - musicbrainz-solrdump:/var/cache/musicbrainz/solr-backups:ro
      - ${MUSICBRAINZ_REPLICATION_CRON:-./musicbrainz-docker/default/replication.cron}:/crons.conf
      - ${MUSICBRAINZ_ACCESS_TOKEN_PATH:-./musicbrainz-docker/local/secrets/metabrainz_access_token}:/run/secrets/metabrainz_access_token
    depends_on:
      musicbrainz-db:
        condition: service_healthy
      musicbrainz-mq:
        condition: service_started
      musicbrainz-search:
        condition: service_started
      musicbrainz-redis:
        condition: service_started
    networks:
      - studio54_network
    labels:
      com.centurylinklabs.watchtower.enable: "false"
      studio54.role: musicbrainz-server

  musicbrainz-indexer:
    build: ./musicbrainz-docker/build/sir
    container_name: musicbrainz-indexer
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${MUSICBRAINZ_DB_USER:-musicbrainz}
      - POSTGRES_PASSWORD=${MUSICBRAINZ_DB_PASSWORD:-musicbrainz}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    volumes:
      - ${MUSICBRAINZ_INDEXER_CONFIG:-./musicbrainz-docker/default/indexer.ini}:/code/config.ini
    depends_on:
      musicbrainz-db:
        condition: service_healthy
      musicbrainz-mq:
        condition: service_started
      musicbrainz-search:
        condition: service_started
    networks:
      - studio54_network
    labels:
      com.centurylinklabs.watchtower.enable: "false"
      studio54.role: musicbrainz-indexer
